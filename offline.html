<!-- Show when user is offline -->
<!DOCTYPE html>
<html>
<head>
    <title>Offline - LoveSync</title>
</head>
<body>
    <div class="offline-page">
        <i class="fas fa-wifi-slash"></i>
        <h2>You're offline</h2>
        <p>Don't worry! You can still access:</p>
        <ul>
            <li>📸 Saved photos</li>
            <li>💬 Old messages</li>
            <li>📅 Calendar</li>
        </ul>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
